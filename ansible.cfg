[defaults]
roles_path=.ansible/roles:ansible/roles
# Preserve top-level fact injection (default changes to False in 2.24)
inject_facts_as_vars = True
# Cache expiry in seconds (e.g., 1 day)
gathering=smart
fact_caching = jsonfile
fact_caching_connection = .ansible/.cache.json
fact_caching_timeout = 86400
