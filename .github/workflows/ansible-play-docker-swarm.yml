name: Ansible Docker Swarm

on:
  pull_request:
    branches:    
      - main
    types:
      - opened
      - edited
      - ready_for_review
      - synchronize
    paths:
      - .github/workflows/ansible.yml
      - 'ansible/**'
      - requirements.txt

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Ensure only one deployment runs at a time
concurrency:
  group: ansible-deploy-${{ github.ref }}
  cancel-in-progress: false

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  validate:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: nix develop .#ansible --command bash -eo pipefail {0}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Run ansible-lint
        run: |
          make install-collection
          ansible-lint ansible

  lock:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      # Lock if this is a PR so two PR cannot deploy at the same time
      - name: PR Lock
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/pr-lock

      - name: Clear PR Lock
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/pr-unlock

  run-playbook:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: nix develop .#ansible --command bash -eo pipefail {0}
    # The validate Job needs to be successful
    needs: [ validate, lock ]
    # The deployment environment thus provides the secrets for that env
    environment: docker_swarm

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Install Nix with flakes support
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      # Cache Nix store for faster subsequent runs
      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: write extra inventory to file
        if: ${{ env.INVENTORY != '' }}
        env:
          INVENTORY: ${{ secrets.ANSIBLE_INVENTORY }}
        run: echo "$INVENTORY" > inventory/extra

      - name: run playbook
        run: |
          ansible-playbook -i ansible/playbooks/inventory ansible/playbooks/main.yml
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

