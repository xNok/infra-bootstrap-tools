name: Publish Flux Artifacts

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  pull_request:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  publish-fleet:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cluster:
          - kind
          - k3s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish fleet/${{ matrix.cluster }} artifact
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          OCI_REPO="oci://ghcr.io/$OWNER_LC/manifests/kubernetes/fleet/${{ matrix.cluster }}"
          
          flux push artifact $OCI_REPO:$(git rev-parse --short HEAD) \
              --path="./kubernetes/fleet/${{ matrix.cluster }}" \
              --source="${{ github.event.repository.html_url }}" \
              --revision="$(git rev-parse HEAD)"
          flux tag artifact $OCI_REPO --tag $(git rev-parse --short HEAD) --tag latest
