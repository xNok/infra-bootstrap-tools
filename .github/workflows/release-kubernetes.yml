name: Release Kubernetes Components

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
        description: 'The tag that triggered the release'
      package_dir:
        required: true
        type: string
        description: 'The directory of the package (e.g. kubernetes)'
      package_name:
        required: true
        type: string
        description: 'The name of the package (e.g. kubernetes-infra-addons)'

jobs:
  publish-oci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Artifact
        env:
          # Extract the pure bundle name from the package name, e.g., 'kubernetes-infra-addons' -> 'infra-addons'
          # We use bash string manipulation below because GitHub Actions string replace is limited.
          OCI_REPO: "oci://ghcr.io/${{ github.repository_owner }}/manifests/kubernetes"
        run: |
          # The tag provides the version, e.g., kubernetes-infra-addons@1.0.0
          TAG_NAME="${{ inputs.release_tag }}"
          BUNDLE_FULL_NAME="${TAG_NAME%@*}"
          VERSION="${TAG_NAME#*@}"
          
          # Remove 'kubernetes-' prefix
          BUNDLE_NAME="${BUNDLE_FULL_NAME#kubernetes-}"
          
          # Publish
          flux push artifact $OCI_REPO/$BUNDLE_NAME:$(git rev-parse --short HEAD) \
              --path="./${{ inputs.package_dir }}/$BUNDLE_NAME" \
              --source="${{ github.event.repository.html_url }}" \
              --revision="$(git rev-parse HEAD)"
          
          # Tag with version from the git tag and latest
          flux tag artifact $OCI_REPO/$BUNDLE_NAME --tag $(git rev-parse --short HEAD) --tag latest --tag $VERSION
