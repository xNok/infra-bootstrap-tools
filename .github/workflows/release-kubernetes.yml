name: Release Kubernetes Components

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
        description: 'The tag that triggered the release'
      package_dir:
        required: true
        type: string
        description: 'The directory of the package (e.g. kubernetes)'
      package_name:
        required: true
        type: string
        description: 'The name of the package (e.g. kubernetes-infra-addons)'

jobs:
  publish-oci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Artifact
        run: ./bin/ci/publish-kubernetes.sh "${{ github.repository_owner }}" "${{ inputs.release_tag }}" "${{ inputs.package_dir }}" "${{ github.event.repository.html_url }}"
