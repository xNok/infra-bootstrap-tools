name: Package and Release Stacks

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g., stacks@1.0.3)'
        required: true
        type: string
      stacks_dir:
        description: 'Directory containing stacks to zip'
        default: 'stacks'
        type: string
      dry_run:
        description: 'Run build without publishing'
        default: false
        type: boolean

  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g., infra-bootstrap-tools-stacks@1.0.3)'
        required: true
        type: string
      stacks_dir:
        description: 'Directory containing stacks to zip'
        default: 'stacks'
        type: string
      dry_run:
        description: 'Run build without publishing'
        default: false
        type: boolean

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  package-and-release:
    name: Package Stacks and Upload to Release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_call' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.release.tag_name, '@')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.event.release.tag_name || github.event.inputs.release_tag }}

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.event_name }}" == "workflow_call" ]; then
            TAG="${{ inputs.release_tag || github.event.inputs.release_tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          # Extract version from tag (format: stacks@1.0.3)
          VERSION=$(echo "$TAG" | sed 's/^.*@//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create stack archives
        run: |
          DIR="${{ inputs.stacks_dir || github.event.inputs.stacks_dir || 'stacks' }}"
          VERSION="${{ steps.version.outputs.version }}"
          DIST_DIR="$GITHUB_WORKSPACE/dist"
          mkdir -p "$DIST_DIR"

          # Create individual stack archives
          for stack in "$DIR"/*/; do
            if [ -d "$stack" ] && [ "$(basename "$stack")" != "node_modules" ]; then
              stack_name=$(basename "$stack")
              echo "Creating archive for $stack_name"
              (cd "$(dirname "$stack")" && zip -r "$DIST_DIR/${stack_name}-${VERSION}.zip" "$stack_name" -x "*/node_modules/*" "*.git/*")
            fi
          done

          # Create a complete stacks archive
          echo "Creating complete stacks archive"
          (cd "$DIR" && zip -r "$DIST_DIR/infra-bootstrap-tools-stacks-${VERSION}.zip" . -x "node_modules/*" "*.git/*" "*/node_modules/*")

          ls -lh "$DIST_DIR/"

      - name: Upload archives to release
        if: ${{ !(inputs.dry_run || github.event.inputs.dry_run) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DIST_DIR="$GITHUB_WORKSPACE/dist"

          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" \
              "$DIST_DIR"/*.zip \
              --clobber
          else
            echo "No GitHub Release found for tag $TAG, skipping upload"
          fi
