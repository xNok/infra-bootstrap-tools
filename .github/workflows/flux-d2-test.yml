name: "Test Flux D2 Bootstrap"
on:
  pull_request:
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: flux-d2-test

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Install Flux in Kind
        run: flux install

      - name: Start local registry
        run: |
          docker run -d -p 5000:5000 --name registry registry:2
          docker network connect "kind" "registry" || true

      - name: Push Repository as OCI
        run: |
          flux push artifact oci://localhost:5000/flux-system:latest \
            --path="./kubernetes" \
            --source="${{ github.event.repository.html_url }}" \
            --revision="${{ github.sha }}"

      - name: Bootstrap cluster from OCI
        run: |
          cat <<KUSTOMIZE | kubectl apply -f -
          apiVersion: source.toolkit.fluxcd.io/v1
          kind: OCIRepository
          metadata:
            name: flux-system
            namespace: flux-system
          spec:
            interval: 1m
            url: oci://registry:5000/flux-system
            ref:
              tag: latest
            insecure: true
          ---
          apiVersion: kustomize.toolkit.fluxcd.io/v1
          kind: Kustomization
          metadata:
            name: fleet
            namespace: flux-system
          spec:
            interval: 1m
            sourceRef:
              kind: OCIRepository
              name: flux-system
            path: "./fleet/k3s-openziti"
            prune: true
          KUSTOMIZE

          kubectl wait --for=condition=ready ocirepository/flux-system -n flux-system --timeout=1m
          kubectl wait --for=condition=ready ks/fleet -n flux-system --timeout=2m
