name: "Test Flux D2 Bootstrap"
on:
  pull_request:
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: flux-d2-test

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Start local registry
        run: |
          docker run -d -p 5000:5000 --name registry registry:2
          docker network connect "kind" "registry" || true

      - name: Install Flux Operator
        run: |
          helm install flux-operator oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator \
            --namespace flux-system --create-namespace

          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=flux-operator -n flux-system --timeout=2m

      - name: Push Repository as OCI
        run: |
          flux push artifact oci://localhost:5000/flux-system:latest \
            --path="./kubernetes" \
            --source="${{ github.event.repository.html_url }}" \
            --revision="${{ github.sha }}"

      - name: Bootstrap cluster from OCI
        run: |
          # Apply the FluxInstance directly from the git repo
          # so that the cluster manages itself after bootstrap
          kubectl apply -f kubernetes/fleet/k3s-openziti/flux-instance.yaml

          # Wait for the operator to reconcile and bring up Flux and sync
          kubectl wait --for=condition=ready fluxinstance/flux -n flux-system --timeout=2m

          # The operator should create an OCIRepository and Kustomization automatically based on the sync block
          kubectl wait --for=condition=ready ocirepository/flux-system -n flux-system --timeout=1m
          kubectl wait --for=condition=ready kustomization/flux-system -n flux-system --timeout=2m
