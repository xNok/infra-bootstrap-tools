name: "Test Flux D2 Bootstrap"
on:
  pull_request:
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: flux-d2-test

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Start local registry
        run: |
          docker run -d -p 5000:5000 --name registry registry:2
          docker network connect "kind" "registry" || true

      - name: Install Flux Operator
        run: |
          helm install flux-operator oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator \
            --namespace flux-system --create-namespace

          cat <<FLUXINSTANCE | kubectl apply -f -
          apiVersion: fluxcd.controlplane.io/v1
          kind: FluxInstance
          metadata:
            name: flux
            namespace: flux-system
          spec:
            distribution:
              version: "2.x"
              registry: "ghcr.io/fluxcd"
              artifact: "oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests"
            components:
              - source-controller
              - kustomize-controller
              - helm-controller
              - notification-controller
          FLUXINSTANCE

          kubectl wait --for=condition=ready fluxinstance/flux -n flux-system --timeout=2m

      - name: Push Repository as OCI
        run: |
          flux push artifact oci://localhost:5000/flux-system:latest \
            --path="./kubernetes" \
            --source="${{ github.event.repository.html_url }}" \
            --revision="${{ github.sha }}"

      - name: Bootstrap cluster from OCI
        run: |
          # Use flux CLI to create the resources instead of kubectl apply
          flux create source oci flux-system \
            --url=oci://registry:5000/flux-system \
            --tag=latest \
            --insecure \
            --interval=1m \
            --namespace=flux-system

          flux create kustomization fleet \
            --source=OCIRepository/flux-system \
            --path="./fleet/k3s-openziti" \
            --prune=true \
            --interval=1m \
            --namespace=flux-system

          kubectl wait --for=condition=ready ocirepository/flux-system -n flux-system --timeout=1m
          kubectl wait --for=condition=ready ks/fleet -n flux-system --timeout=2m
