name: Central Publish Workflow

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  publish-agentic:
    if: contains(github.event.release.tag_name, 'infra-bootstrap-tools-agentic@')
    uses: ./.github/workflows/python-package-publish.yml
    with:
      release_tag: ${{ github.event.release.tag_name }}
      package_dir: 'agentic'
      package_name: 'infra-bootstrap-tools-agentic'

  publish-stacks:
    if: contains(github.event.release.tag_name, 'infra-bootstrap-tools-stacks@')
    uses: ./.github/workflows/stacks-package-release.yml
    with:
      release_tag: ${{ github.event.release.tag_name }}
      stacks_dir: 'stacks'

  publish-ansible:
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/ansible-collection-publish.yml
    with:
      release_tag: ${{ github.ref_name }}
      collection_dir: 'ansible'
    secrets:
      GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
