name: Publish Ansible Collection

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g., v1.0.0 or workspace@1.0.0)'
        required: true
        type: string
      collection_dir:
        description: 'Directory containing the Ansible collection'
        default: 'ansible'
        type: string
      dry_run:
        description: 'Run build without publishing'
        default: false
        type: boolean
    secrets:
      GALAXY_API_KEY:
        required: false

  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g., v1.0.0)'
        required: true
        type: string
      collection_dir:
        description: 'Directory containing the Ansible collection'
        default: 'ansible'
        type: string
      dry_run:
        description: 'Run build without publishing'
        default: false
        type: boolean

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    name: Build and Publish Ansible Collection
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.event.inputs.release_tag || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Ansible dependencies
        run: pip install ansible-core

      - name: Install mikefarah/yq
        run: ./bin/ci/lib/install-yq.sh

      - name: Extract version from tag
        id: get_version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUTS_RELEASE_TAG: ${{ inputs.release_tag || github.event.inputs.release_tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: ./bin/ci/lib/extract-version.sh

      - name: Update collection version
        run: yq -i ".version = \"${{ steps.get_version.outputs.VERSION }}\"" ${{ inputs.collection_dir || 'ansible' }}/galaxy.yml

      - name: Build Ansible Collection
        id: build
        env:
          COLLECTION_DIR: ${{ inputs.collection_dir || 'ansible' }}
        run: ./bin/ci/build-ansible-collection.sh

      - name: Publish collection to Ansible Galaxy
        if: ${{ !(inputs.dry_run || github.event.inputs.dry_run) }}
        uses: artis3n/ansible_galaxy_collection@v2
        with:
          api_key: ${{ secrets.GALAXY_API_KEY }}
          collection_dir: ${{ inputs.collection_dir || 'ansible' }}

      - name: Upload collection to GitHub Release
        if: ${{ !(inputs.dry_run || github.event.inputs.dry_run) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          INPUTS_RELEASE_TAG: ${{ inputs.release_tag || github.event.inputs.release_tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          ASSET_PATH: ${{ steps.build.outputs.TARBALL }}
        run: ./bin/ci/lib/upload-github-release-asset.sh
