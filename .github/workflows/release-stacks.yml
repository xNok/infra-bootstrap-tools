name: Package and Release Stacks

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g., stacks@1.0.3)'
        required: true
        type: string
      stacks_dir:
        description: 'Directory containing stacks to zip'
        default: 'stacks'
        type: string
      dry_run:
        description: 'Run build without publishing'
        default: false
        type: boolean

  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g., infra-bootstrap-tools-stacks@1.0.3)'
        required: true
        type: string
      stacks_dir:
        description: 'Directory containing stacks to zip'
        default: 'stacks'
        type: string
      dry_run:
        description: 'Run build without publishing'
        default: false
        type: boolean

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  package-and-release:
    name: Package Stacks and Upload to Release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_call' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.release.tag_name, '@')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.event.release.tag_name || github.event.inputs.release_tag }}

      - name: Extract version from tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.release_tag || github.event.inputs.release_tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: ./bin/ci/extract-version.sh "$EVENT_NAME" "$INPUT_TAG" "$RELEASE_TAG"

      - name: Create stack archives
        env:
          DIR: ${{ inputs.stacks_dir || github.event.inputs.stacks_dir || 'stacks' }}
          VERSION: ${{ steps.version.outputs.version }}
          DIST_DIR: ${{ github.workspace }}/dist
        run: ./bin/ci/package-stacks.sh "$DIR" "$VERSION" "$DIST_DIR"

      - name: Upload archives to release
        if: ${{ !(inputs.dry_run || github.event.inputs.dry_run) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          DIST_DIR: ${{ github.workspace }}/dist
        run: ./bin/ci/upload-stacks-release.sh "$TAG" "$DIST_DIR"
