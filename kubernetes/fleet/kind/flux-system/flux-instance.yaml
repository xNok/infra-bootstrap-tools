apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "2.x"
    registry: "ghcr.io/fluxcd"
    artifact: "oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests"
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  sync:
    kind: OCIRepository
    url: "oci://kind-registry:5000/flux-system"
    ref: "latest"
    path: "./fleet/kind"
  kustomize:
    patches:
      # Patch the generated OCIRepository to allow insecure registry for local testing
      - patch: |
          apiVersion: source.toolkit.fluxcd.io/v1
          kind: OCIRepository
          metadata:
            name: flux-system
            namespace: flux-system
          spec:
            insecure: true
        target:
          kind: OCIRepository
          name: flux-system
      # Override infra-addons OCIRepository to use local registry for local testing
      - patch: |
          apiVersion: source.toolkit.fluxcd.io/v1
          kind: OCIRepository
          metadata:
            name: infra-addons
            namespace: flux-system
          spec:
            url: oci://kind-registry:5000/infra-addons
            insecure: true
            ref:
              tag: latest
        target:
          kind: OCIRepository
          name: infra-addons
