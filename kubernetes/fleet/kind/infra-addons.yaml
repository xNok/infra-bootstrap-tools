apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-addons
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: OCIRepository
    name: flux-system
  path: "./fleet/kind/infra-addons"
  prune: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-runtime-info

        prune: true
        postBuild:
          substituteFrom:
            - kind: ConfigMap
              name: flux-runtime-info

