apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: flux-system
spec:
  targetNamespace: keycloak
  chart:
    spec:
      chart: keycloak
      version: "22.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  interval: 1h
  install:
    createNamespace: true
  valuesFrom:
    - kind: ConfigMap
      name: default-keycloak-values
    - kind: ConfigMap
      name: ${CLUSTER_NAME}-keycloak-values
      optional: true
