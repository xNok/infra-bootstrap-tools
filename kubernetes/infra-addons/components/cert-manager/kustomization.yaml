apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - namespace.yaml
  - cert-manager.yaml
  - trust-manager.yaml
configMapGenerator:
  - name: default-cert-manager-values
    namespace: flux-system
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=default-cert-manager.values.yaml
  - name: default-trust-manager-values
    namespace: flux-system
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=default-trust-manager.values.yaml
