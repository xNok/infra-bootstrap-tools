apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ziti-controller
  namespace: flux-system
spec:
  targetNamespace: openziti
  chart:
    spec:
      chart: ziti-controller
      version: "3.1.1"
      sourceRef:
        kind: HelmRepository
        name: openziti
        namespace: flux-system
  interval: 1h
  dependsOn:
    - name: trust-manager
      namespace: flux-system
  install:
    createNamespace: true
  valuesFrom:
    - kind: ConfigMap
      name: default-ziti-controller-values
    - kind: ConfigMap
      name: ${CLUSTER_NAME}-ziti-controller-values
      optional: true
