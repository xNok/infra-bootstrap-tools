apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ziti-controller
  namespace: flux-system
spec:
  targetNamespace: openziti
  chart:
    spec:
      chart: ziti-controller
      version: "0.0.12"  # Verify latest version or remove to track latest
      sourceRef:
        kind: HelmRepository
        name: openziti
        namespace: flux-system
  interval: 1h
  install:
    createNamespace: true
  valuesFrom:
    - kind: ConfigMap
      name: ${CLUSTER_NAME}-ziti-controller-values
      optional: true
  values:
    clientApi:
      advertisedHost: "ziti-controller.openziti.svc.cluster.local"
      advertisedPort: 1280
    ctrlPlane:
      advertisedHost: "ziti-controller.openziti.svc.cluster.local"
      advertisedPort: 6262
    # Add persistence and other config as needed
