---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ziti-router
  namespace: flux-system
spec:
  targetNamespace: openziti
  dependsOn:
    - name: ziti-controller
      namespace: flux-system
  chart:
    spec:
      chart: ziti-router
      version: "2.1.0"
      sourceRef:
        kind: HelmRepository
        name: openziti
        namespace: flux-system
  interval: 1h
  install:
    createNamespace: true
  valuesFrom:
    - kind: ConfigMap
      name: default-ziti-router-values
    - kind: ConfigMap
      name: ${CLUSTER_NAME}-ziti-router-values
      optional: true
