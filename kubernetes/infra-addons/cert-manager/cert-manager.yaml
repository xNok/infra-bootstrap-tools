apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  targetNamespace: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: "v1.14.4"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  interval: 1h
  install:
    createNamespace: true
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: ${CLUSTER_NAME}-cert-manager-values
      optional: true
  values:
    prometheus:
      enabled: false
