---
- name: Setup K3s Server
  hosts: k3s_servers
  become: true
  vars:
    # Enable Dark Stack Mode
    k3s_server_use_openziti_dark: true
  roles:
    - xnok.infra_bootstrap_tools.k3s_os_hardening
    - xnok.infra_bootstrap_tools.k3s_server
    # Requires 1Password secrets! See roles/k3s_flux_bootstrap/README.md for creating them.
    - xnok.infra_bootstrap_tools.k3s_flux_bootstrap

- name: Setup K3s Agents
  hosts: k3s_agents
  become: true
  roles:
    - k3s_agent
